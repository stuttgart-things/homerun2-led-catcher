---
version: 3
vars:
  BRANCH:
    sh: if [ $(git rev-parse --abbrev-ref HEAD) != "main" ]; then echo $(git rev-parse --abbrev-ref HEAD); else echo main; fi
  DAGGER_MODULE_VERSION: v0.86.0
  PYTHON_MODULE: github.com/stuttgart-things/dagger/python@{{ .DAGGER_MODULE_VERSION }}
  DOCKER_MODULE: github.com/stuttgart-things/dagger/docker@{{ .DAGGER_MODULE_VERSION }}
  TRIVY_MODULE: github.com/stuttgart-things/dagger/trivy@{{ .DAGGER_MODULE_VERSION }}
  KCL_MODULE: github.com/stuttgart-things/dagger/kcl@{{ .DAGGER_MODULE_VERSION }}
  REPOSITORY_NAME: stuttgart-things/homerun2-led-catcher
  REGISTRY_URL: ttl.sh
  TAG: 1h

tasks:

  ## ──────────────────────────────────────────────
  ## LOCAL (fast, no Docker/Dagger needed)
  ## ──────────────────────────────────────────────

  install:
    desc: Install package in editable mode with dev dependencies
    cmds:
      - pip install -e ".[dev]"

  lint:
    desc: Run ruff linter
    cmds:
      - ruff check src/ tests/

  format:
    desc: Format code with ruff (auto-fix)
    cmds:
      - ruff format src/ tests/

  format-check:
    desc: Check code formatting with ruff (non-modifying)
    cmds:
      - ruff format --check src/ tests/

  test:
    desc: Run pytest
    cmds:
      - pytest tests/ -v

  run:
    desc: Run led-catcher locally (LED_MODE=web, no hardware needed)
    env:
      LED_MODE: web
      LOG_FORMAT: text
      LOG_LEVEL: info
    cmds:
      - python -m led_catcher

  build-image:
    desc: Build Docker image locally
    cmds:
      - docker build -t homerun2-led-catcher:local .

  pages-local:
    desc: Build mkdocs pages locally
    cmds:
      - pip install -q mkdocs-material
      - mkdocs build -d public
      - echo "Pages built in ./public"

  ## ──────────────────────────────────────────────
  ## PRE-COMMIT (runs before every git commit)
  ## ──────────────────────────────────────────────

  precommit:
    desc: "Pre-commit checks: lint + format-check + test"
    cmds:
      - task: lint
      - task: format-check
      - task: test

  setup-precommit:
    desc: Install git pre-commit hook
    cmds:
      - |
        cat > .git/hooks/pre-commit << 'HOOK'
        #!/bin/sh
        echo "Running pre-commit checks..."
        task precommit
        HOOK
        chmod +x .git/hooks/pre-commit
        echo "Pre-commit hook installed"

  ## ──────────────────────────────────────────────
  ## STAGE 1: PUSH (same as GH Actions on push)
  ## lint + format-check + test + security-scan
  ## ──────────────────────────────────────────────

  ci:
    desc: "Stage 1 — full validation via Dagger (same as push CI)"
    cmds:
      - task: ci-lint
      - task: ci-format-check
      - task: ci-test
      - task: ci-security-scan

  ci-lint:
    desc: Run ruff linter via Dagger
    cmds:
      - dagger call -m {{ .PYTHON_MODULE }} lint --src . --progress plain

  ci-format-check:
    desc: Run ruff format check via Dagger
    cmds:
      - dagger call -m {{ .PYTHON_MODULE }} format-check --src . --progress plain

  ci-test:
    desc: Run pytest via Dagger
    cmds:
      - dagger call -m {{ .PYTHON_MODULE }} test --src . --progress plain

  ci-security-scan:
    desc: Run bandit security scan via Dagger
    cmds:
      - dagger call -m {{ .PYTHON_MODULE }} security-scan --src . --progress plain

  ## ──────────────────────────────────────────────
  ## STAGE 2: PR (same as GH Actions on PR)
  ## build → push ttl.sh → trivy scan
  ## ──────────────────────────────────────────────

  ci-pr:
    desc: "Stage 2 — full PR pipeline: validate + build + push + scan"
    cmds:
      - task: ci
      - task: ci-docker-push
      - task: ci-trivy-scan

  ci-docker-build:
    desc: Build Docker image via Dagger
    cmds:
      - dagger call -m {{ .DOCKER_MODULE }} build --src . --progress plain

  ci-docker-push:
    desc: Build and push Docker image to ttl.sh
    cmds:
      - |
        dagger call -m {{ .DOCKER_MODULE }} \
        build --src . \
        push \
        --repository-name {{ .REPOSITORY_NAME }} \
        --registry-url {{ .REGISTRY_URL }} \
        --tag {{ .TAG }} \
        --progress plain

  ci-trivy-scan:
    desc: Trivy scan image on ttl.sh
    cmds:
      - |
        dagger call -m {{ .TRIVY_MODULE }} \
        scan-image \
        --image-ref {{ .REGISTRY_URL }}/{{ .REPOSITORY_NAME }}:{{ .TAG }} \
        --progress plain \
        export --path /tmp/trivy-report.json
        echo "Report: /tmp/trivy-report.json"

  ## ──────────────────────────────────────────────
  ## STAGE 3: RELEASE (same as GH Actions release)
  ## semantic-release → GHCR push → kustomize OCI
  ## ──────────────────────────────────────────────

  ci-release:
    desc: "Stage 3 — full release: validate + build + push GHCR + kustomize OCI"
    cmds:
      - task: ci
      - task: ci-docker-push
      - task: ci-trivy-scan
      - task: ci-push-kustomize

  ci-push-kustomize:
    desc: Render KCL and push kustomize base as OCI artifact
    cmds:
      - |
        dagger call -m {{ .KCL_MODULE }} \
        push-kustomize-base \
        --source ./kcl \
        --parameters-file ./tests/kcl-deploy-profile.yaml \
        --address {{ .REGISTRY_URL }}/{{ .REPOSITORY_NAME }}-kustomize \
        --tag {{ .TAG }} \
        --progress plain

  ## ──────────────────────────────────────────────
  ## GIT WORKFLOW
  ## ──────────────────────────────────────────────

  branch:
    desc: Create branch from main
    cmds:
      - git checkout main
      - git pull
      - |
        echo "Enter branch name:"
        read BRANCH_NAME;
        git checkout -b ${BRANCH_NAME}
        git push origin ${BRANCH_NAME}

  commit:
    desc: Commit + push code into branch
    cmds:
      - git branch --set-upstream-to=origin/{{ .BRANCH }}
      - git pull
      - |
        echo "ENTER COMMIT MESSAGE"
        read COMMIT_MESSAGE;
        git add *
        git commit -am "$(echo ${COMMIT_MESSAGE})"
        git push origin -u {{ .BRANCH }}

  pr:
    desc: Create pull request into main
    cmds:
      - task: commit
      - gh pr create -t "{{ .BRANCH }}" -b "{{ .BRANCH }} branch into main"
      - sleep 10s
      - gh pr merge $(gh pr list | grep "^[^#;]" | awk '{print $1}') --auto --rebase --delete-branch
      - git checkout main && git pull
