---
version: 3
vars:
  BRANCH:
    sh: if [ $(git rev-parse --abbrev-ref HEAD) != "main" ]; then echo $(git rev-parse --abbrev-ref HEAD); else echo main; fi

tasks:
  install:
    desc: Install package in editable mode with dev dependencies
    cmds:
      - pip install -e ".[dev]"

  lint:
    desc: Run ruff linter
    cmds:
      - ruff check src/ tests/

  format:
    desc: Format code with ruff
    cmds:
      - ruff format src/ tests/

  format-check:
    desc: Check code formatting with ruff (non-modifying)
    cmds:
      - ruff format --check src/ tests/

  test:
    desc: Run pytest
    cmds:
      - pytest tests/ -v

  precommit:
    desc: Run pre-commit checks (lint, format-check, test) - fast local checks
    cmds:
      - task: lint
      - task: format-check
      - task: test

  setup-precommit:
    desc: Install git pre-commit hook that runs task precommit
    cmds:
      - |
        cat > .git/hooks/pre-commit << 'HOOK'
        #!/bin/sh
        echo "Running pre-commit checks..."
        task precommit
        HOOK
        chmod +x .git/hooks/pre-commit
        echo "Pre-commit hook installed"

  run:
    desc: Run led-catcher locally (LED_MODE=web, no hardware needed)
    env:
      LED_MODE: web
      LOG_FORMAT: text
      LOG_LEVEL: info
    cmds:
      - python -m led_catcher

  build-image:
    desc: Build Docker image
    cmds:
      - docker build -t homerun2-led-catcher:local .

  ci:
    desc: Run full CI pipeline locally via Dagger (same as GitHub Actions)
    cmds:
      - task: ci-lint
      - task: ci-format-check
      - task: ci-test
      - task: ci-security-scan

  ci-lint:
    desc: Run ruff linter via Dagger
    cmds:
      - |
        dagger call -m {{ .DAGGER_MODULE }} \
        lint --src . \
        --progress plain
    vars:
      DAGGER_MODULE: github.com/stuttgart-things/dagger/python@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0

  ci-format-check:
    desc: Run ruff format check via Dagger
    cmds:
      - |
        dagger call -m {{ .DAGGER_MODULE }} \
        format-check --src . \
        --progress plain
    vars:
      DAGGER_MODULE: github.com/stuttgart-things/dagger/python@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0

  ci-test:
    desc: Run pytest via Dagger
    cmds:
      - |
        dagger call -m {{ .DAGGER_MODULE }} \
        test --src . \
        --progress plain
    vars:
      DAGGER_MODULE: github.com/stuttgart-things/dagger/python@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0

  ci-security-scan:
    desc: Run bandit security scan via Dagger
    cmds:
      - |
        dagger call -m {{ .DAGGER_MODULE }} \
        security-scan --src . \
        --progress plain
    vars:
      DAGGER_MODULE: github.com/stuttgart-things/dagger/python@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0

  ci-build-image:
    desc: Build Docker image via Dagger (python module)
    cmds:
      - |
        dagger call -m {{ .DAGGER_MODULE }} \
        build-image --src . \
        --progress plain
    vars:
      DAGGER_MODULE: github.com/stuttgart-things/dagger/python@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0

  ci-docker-build:
    desc: Build Docker image via Dagger (docker module)
    cmds:
      - |
        dagger call -m {{ .DOCKER_MODULE }} \
        build --src . \
        --progress plain
    vars:
      DOCKER_MODULE: github.com/stuttgart-things/dagger/docker@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0

  ci-docker-push:
    desc: Build and push Docker image to ttl.sh (ephemeral, 1h TTL)
    cmds:
      - |
        dagger call -m {{ .DOCKER_MODULE }} \
        build --src . \
        push \
        --repository-name {{ .REPOSITORY_NAME }} \
        --registry-url {{ .REGISTRY_URL }} \
        --tag {{ .TAG }} \
        --progress plain
    vars:
      DOCKER_MODULE: github.com/stuttgart-things/dagger/docker@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0
      REPOSITORY_NAME: stuttgart-things/homerun2-led-catcher
      REGISTRY_URL: ttl.sh
      TAG: 1h

  ci-trivy-scan:
    desc: Scan Docker image with Trivy (push to ttl.sh first, then scan)
    cmds:
      - |
        IMAGE_REF=$(dagger call -m {{ .DOCKER_MODULE }} \
        build --src . \
        push \
        --repository-name {{ .REPOSITORY_NAME }} \
        --registry-url {{ .REGISTRY_URL }} \
        --tag {{ .TAG }} \
        --progress plain)
        echo "Pushed image: ${IMAGE_REF}"
        dagger call -m {{ .TRIVY_MODULE }} \
        scan-image \
        --image-ref "${IMAGE_REF}" \
        --progress plain \
        export --path /tmp/trivy-report.json
        echo "Trivy report saved to /tmp/trivy-report.json"
        cat /tmp/trivy-report.json | python3 -c "import sys,json; d=json.load(sys.stdin); s=d.get('ParsedSummary',{}); print(f'Vulnerabilities: {json.dumps(s, indent=2)}')" 2>/dev/null || cat /tmp/trivy-report.json | head -50
    vars:
      DOCKER_MODULE: github.com/stuttgart-things/dagger/docker@{{ .DAGGER_MODULE_VERSION }}
      TRIVY_MODULE: github.com/stuttgart-things/dagger/trivy@{{ .DAGGER_MODULE_VERSION }}
      DAGGER_MODULE_VERSION: v0.86.0
      REPOSITORY_NAME: stuttgart-things/homerun2-led-catcher
      REGISTRY_URL: ttl.sh
      TAG: 1h

  branch:
    desc: Create branch from main
    cmds:
      - git checkout main
      - git pull
      - |
        echo "Enter branch name:"
        read BRANCH_NAME;
        git checkout -b ${BRANCH_NAME}
        git push origin ${BRANCH_NAME}

  commit:
    desc: Commit + push code into branch
    cmds:
      - git branch --set-upstream-to=origin/{{ .BRANCH }}
      - git pull
      - |
        echo "ENTER COMMIT MESSAGE"
        read COMMIT_MESSAGE;
        git add *
        git commit -am "$(echo ${COMMIT_MESSAGE})"
        git push origin -u {{ .BRANCH }}

  pr:
    desc: Create pull request into main
    cmds:
      - task: commit
      - gh pr create -t "{{ .BRANCH }}" -b "{{ .BRANCH }} branch into main"
      - sleep 10s
      - gh pr merge $(gh pr list | grep "^[^#;]" | awk '{print $1}') --auto --rebase --delete-branch
      - git checkout main && git pull
