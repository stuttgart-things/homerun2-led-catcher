---
name: Build & Test
on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main

jobs:
  python-validation:
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-python-validation.yaml@main
    with:
      runs-on: dagger
      module-name: homerun2-led-catcher
      python-version: "3.12-slim"
      ruff-version: "0.8.6"
      environment-name: k8s
      accept-linterrors: false
      accept-failedtests: false
    secrets: inherit

  build-docker-image:
    runs-on: dagger
    needs: python-validation
    environment: k8s
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build Docker image
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.0"
          verb: call
          module: github.com/stuttgart-things/dagger/docker@v0.86.0
          args: >-
            build
            --src .

      - name: Scan Docker image
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.0"
          verb: call
          module: github.com/stuttgart-things/dagger/python@v0.86.0
          args: >-
            build-image
            --src .
        continue-on-error: true
