---
name: Build & Test
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-validation:
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-python-validation.yaml@main
    with:
      runs-on: dagger
      module-name: homerun2-led-catcher
      python-version: "3.12-slim"
      ruff-version: "0.8.6"
      environment-name: k8s
      accept-linterrors: false
      accept-failedtests: false
    secrets: inherit

  build-push-scan:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: dagger
    needs: python-validation
    environment: k8s
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build and push Docker image to ttl.sh
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.0"
          verb: call
          module: github.com/stuttgart-things/dagger/docker@v0.86.0
          args: >-
            build
            --src .
            push
            --repository-name stuttgart-things/homerun2-led-catcher
            --registry-url ttl.sh
            --tag 1h

      - name: Trivy scan pushed image
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: "0.20.0"
          verb: call
          module: github.com/stuttgart-things/dagger/trivy@v0.86.0
          args: >-
            scan-image
            --image-ref ttl.sh/stuttgart-things/homerun2-led-catcher:1h
            export --path /tmp/trivy-report.json
        continue-on-error: true
